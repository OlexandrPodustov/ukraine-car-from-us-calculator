<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Пошуки — Авто із США</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&subset=latin,cyrillic"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/app.css" />
    <style>
      .page {
        font-family: Roboto, system-ui, sans-serif;
        max-width: 1200px;
        margin: 0 auto;
        padding: 16px;
        color: #1f2937;
      }
      h1 {
        font-size: 22px;
        margin: 8px 0 16px;
      }
      .muted {
        color: #6b7280;
        font-size: 14px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }
      th,
      td {
        padding: 8px 10px;
        border-bottom: 1px solid #e5e7eb;
        text-align: right;
        white-space: nowrap;
      }
      th {
        text-align: right;
        color: #6b7280;
        font-weight: 600;
        border-bottom: 2px solid #d1d5db;
      }
      th:first-child,
      td:first-child,
      th:nth-child(2),
      td:nth-child(2) {
        text-align: left;
      }
      tr:hover td {
        background: #f9fafb;
      }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 600;
      }
      .badge.underpriced {
        background: #dcfce7;
        color: #166534;
      }
      .badge.overpriced {
        background: #fee2e2;
        color: #991b1b;
      }
      .badge.fair {
        background: #e5e7eb;
        color: #374151;
      }
      .pos {
        color: #166534;
      }
      .neg {
        color: #991b1b;
      }
      a.analyze {
        color: #2563eb;
        text-decoration: none;
        font-weight: 600;
      }
      .empty {
        padding: 40px;
        text-align: center;
        color: #6b7280;
      }
    </style>
  </head>
  <body style="margin: 0">
    <nav class="app-nav">
      <a href="/index.html">🧮 Калькулятор</a>
      <a href="/searches.html" class="active">🔎 Пошуки</a>
      <a href="/stats.html">📊 Статистика</a>
    </nav>
    <div class="app-nav-spacer"></div>

    <div class="page">
      <h1>Історія пошуків ринкової ціни</h1>
      <p class="muted">
        Кожен успішний пошук на калькуляторі логується у локальну SQLite
        (<code>data/searches.db</code>). Останні 200 записів:
      </p>
      <div id="content"><p class="muted">Завантаження…</p></div>
    </div>

    <script>
      function fmt(n) {
        if (n === null || n === undefined || n === "") return "—";
        return "$" + Number(n).toLocaleString("en-US");
      }
      function dt(iso) {
        try {
          return new Date(iso).toLocaleString("uk-UA", {
            dateStyle: "short",
            timeStyle: "short",
          });
        } catch (e) {
          return iso;
        }
      }
      function catLabel(c) {
        if (c === "underpriced") return "вигідно";
        if (c === "overpriced") return "дорого";
        return "норма";
      }

      fetch("/api/searches")
        .then(function (r) {
          return r.json();
        })
        .then(function (rows) {
          var el = document.getElementById("content");
          if (!rows || !rows.length) {
            el.innerHTML =
              '<div class="empty">Поки що немає пошуків. Зроби пошук ціни на ' +
              '<a href="/index.html">калькуляторі</a>.</div>';
            return;
          }
          var head =
            "<tr><th>Дата</th><th>Авто</th><th>Двигун</th><th>Ринок</th>" +
            "<th>n</th><th>IQ-сер.</th><th>Медіана</th><th>Наш кошт</th>" +
            "<th>Різниця</th><th>Оцінка</th><th></th></tr>";
          var body = rows
            .map(function (r) {
              var car =
                [r.make, r.model, r.year].filter(Boolean).join(" ") +
                (r.model_matched ? "" : " <span class='muted'>(марка+рік)</span>");
              var eng = [
                r.engine_type || "",
                r.engine_volume ? r.engine_volume + "л" : "",
              ]
                .filter(Boolean)
                .join(" ");
              var diffCls = r.diff > 0 ? "pos" : r.diff < 0 ? "neg" : "";
              var diffTxt =
                r.diff === null
                  ? "—"
                  : (r.diff > 0 ? "+" : "") + fmt(r.diff).replace("$-", "-$");
              return (
                "<tr><td>" +
                dt(r.ts) +
                "</td><td>" +
                car +
                "</td><td>" +
                (eng || "—") +
                "</td><td>" +
                fmt(r.market_price) +
                "</td><td>" +
                (r.sample_count || "—") +
                "</td><td>" +
                fmt(r.iq_mean) +
                "</td><td>" +
                fmt(r.median) +
                "</td><td>" +
                fmt(r.total_cost) +
                "</td><td class='" +
                diffCls +
                "'>" +
                diffTxt +
                "</td><td><span class='badge " +
                (r.category || "fair") +
                "'>" +
                catLabel(r.category) +
                "</span></td><td><a class='analyze' href='/stats.html?id=" +
                r.id +
                "'>аналіз →</a></td></tr>"
              );
            })
            .join("");
          el.innerHTML = "<table>" + head + "<tbody>" + body + "</tbody></table>";
        })
        .catch(function (e) {
          document.getElementById("content").innerHTML =
            '<div class="empty">Помилка завантаження: ' +
            e.message +
            ". Чи запущено сервер (<code>npm start</code>)?</div>";
        });
    </script>
  </body>
</html>
